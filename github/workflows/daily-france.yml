name: France power daily pipeline

on:
  schedule:
    - cron: "30 10 * * *"
      timezone: "Europe/Paris"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: france-power-daily
  cancel-in-progress: false

jobs:
  forecast:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run offline tests
        run: pytest -q

      - name: Forecast and self-grade
        run: python run_daily.py

      - name: Update scorecard
        run: python scorecard.py

      - name: Update risk report
        run: python risk_report.py

      - name: Commit generated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fr_predictions_log.csv SCORECARD.md RISK_REPORT.md
          git commit -m "France desk update $(date -u +%Y-%m-%d)" || echo "nothing to commit"
          git push
